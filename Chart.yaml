apiVersion: v2
name: umbrella-owl
description: Umbrella Helm chart for the Wisbric owl ecosystem
type: application
version: 0.5.0
appVersion: "0.5.0"
maintainers:
  - name: Wisbric
    url: https://wisbric.com
keywords:
  - wisbric
  - owlstack
  - incident-management
  - ticketing
  - on-call

dependencies:
  # -- Owl applications (OCI from GHCR)
  - name: owlstack
    version: "0.3.2"
    repository: "file://../owlstack/deploy/helm/owlstack"

  # -- Third-party dependencies (upstream registries)
  - name: postgresql
    version: "16.4.1"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: "20.6.2"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: keycloak
    version: "25.2.0"
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: keycloak.enabled
  - name: zammad
    version: "10.3.0"
    repository: https://zammad.github.io/zammad-helm
    condition: zammad.enabled

  # -- Keep (AIOps alert management) — SSO via oauth2-proxy
  - name: keep
    version: "0.1.94"
    repository: https://keephq.github.io/helm-charts
    condition: keep.enabled

  # -- Outline (collaborative wiki) — replaces BookOwl
  - name: outline
    version: "2.2.2"
    repository: https://helm.liam.sh
    condition: outline.enabled

  # -- Garage (S3-compatible storage for Outline uploads)
  - name: garage
    version: "2.1.0"
    repository: https://charts.derwitt.dev
    condition: garage.enabled

  # -- Vector (vector.dev) — Log/metric pipeline for alert ingestion into Keep
  - name: vector
    version: "0.50.0"
    repository: https://helm.vector.dev
    condition: vector.enabled
