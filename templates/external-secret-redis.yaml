{{- if and .Values.externalSecrets.enabled .Values.redis.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: owl-redis
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: owl-redis
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: platform/owl/redis
        property: password
{{- end }}
