{{- if and .Values.owlstack .Values.owlstack.mcp .Values.owlstack.mcp.enabled }}
{{- if and .Values.owlstack.ingress .Values.owlstack.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-owlstack-mcp
  labels:
    app.kubernetes.io/name: owlstack-mcp
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    {{- with .Values.owlstack.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  {{- if .Values.owlstack.ingress.className }}
  ingressClassName: {{ .Values.owlstack.ingress.className }}
  {{- end }}
  {{- if .Values.owlstack.ingress.tls }}
  tls:
    {{- range .Values.owlstack.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ (index .Values.owlstack.ingress.hosts 0).host | quote }}
      http:
        paths:
          - path: /mcp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-owlstack-mcp
                port:
                  number: 8081
{{- end }}
{{- end }}
