{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: owl-owlstack
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: owl-owlstack
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: platform/owl/owlstack
        property: database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: platform/owl/owlstack
        property: redis-url
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: platform/owl/owlstack
        property: oidc-client-secret
    - secretKey: OWLSTACK_SESSION_SECRET
      remoteRef:
        key: platform/owl/owlstack
        property: session-secret
    - secretKey: OWLSTACK_ENCRYPTION_KEY
      remoteRef:
        key: platform/owl/owlstack
        property: encryption-key
    - secretKey: OWLSTACK_WEBHOOK_KEY
      remoteRef:
        key: platform/owl/owlstack
        property: webhook-key
    - secretKey: OWLSTACK_API_KEY
      remoteRef:
        key: platform/owl/owlstack
        property: api-key
    - secretKey: OWLSTACK_KEEP_API_KEY
      remoteRef:
        key: platform/owl/keep
        property: admin-api-key
    - secretKey: OWLSTACK_OUTLINE_API_TOKEN
      remoteRef:
        key: platform/owl/owlstack
        property: outline-api-token
{{- end }}
