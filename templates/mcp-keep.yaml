{{- if and .Values.mcpServers .Values.mcpServers.keep .Values.mcpServers.keep.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp-keep
  labels:
    app.kubernetes.io/name: mcp-keep
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-keep
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-keep
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: mcp-keep
          image: {{ .Values.mcpServers.keep.image | default "ghcr.io/wisbric/keep-mcp:main" }}
          env:
            - name: KEEP_URL
              value: {{ .Values.mcpServers.keep.keepUrl | default (printf "http://%s-keep-backend:8080" .Release.Name) | quote }}
            - name: KEEP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcpServers.keep.secretName | default (printf "%s-keep-secrets" .Release.Name) }}
                  key: {{ .Values.mcpServers.keep.secretKey | default "KEEP_API_KEY" }}
            - name: LISTEN_ADDR
              value: ":8082"
          ports:
            - name: http
              containerPort: 8082
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp-keep
  labels:
    app.kubernetes.io/name: mcp-keep
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-keep
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
