{{- if and .Values.mcpServers .Values.mcpServers.kubernetes .Values.mcpServers.kubernetes.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-mcp-k8s
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-mcp-k8s
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "configmaps", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-mcp-k8s
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-mcp-k8s
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-mcp-k8s
    namespace: {{ .Release.Namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp-k8s
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-k8s
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-k8s
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-mcp-k8s
      containers:
        - name: mcp-k8s
          image: {{ .Values.mcpServers.kubernetes.image | default "ghcr.io/containers/kubernetes-mcp-server:latest" }}
          args:
            - "--transport=http"
            - "--port=8083"
            - "--namespace={{ .Release.Namespace }}"
            {{- if .Values.mcpServers.kubernetes.readOnly | default true }}
            - "--read-only"
            {{- end }}
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp-k8s
  labels:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mcp-k8s
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
