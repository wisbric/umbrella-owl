{{/*
PostgreSQL backup CronJob — dumps all owl databases daily and stores
them in a PVC. Controlled by .Values.backup.enabled.
*/}}
{{- if .Values.backup.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-backup
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.backup.storageClass | default "longhorn" }}
  resources:
    requests:
      storage: {{ .Values.backup.storageSize | default "5Gi" }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: backup
spec:
  schedule: {{ .Values.backup.schedule | default "0 2 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: backup
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  DATE=$(date +%Y%m%d-%H%M%S)
                  BACKUP_DIR="/backups/$DATE"
                  mkdir -p "$BACKUP_DIR"

                  echo "=== Starting backup at $DATE ==="

                  {{- range .Values.backup.databases }}
                  echo "Dumping {{ . }} ..."
                  pg_dump -Fc -f "$BACKUP_DIR/{{ . }}.dump" -d "{{ . }}" 2>&1
                  echo "  {{ . }}: $(du -h "$BACKUP_DIR/{{ . }}.dump" | cut -f1)"
                  {{- end }}

                  echo "=== Backup complete ==="
                  ls -lh "$BACKUP_DIR/"

                  # Retention: remove backups older than N days
                  echo "Pruning backups older than {{ .Values.backup.retentionDays | default 7 }} days..."
                  find /backups -mindepth 1 -maxdepth 1 -type d -mtime +{{ .Values.backup.retentionDays | default 7 }} -exec rm -rf {} \;
                  echo "Remaining backups:"
                  ls -1 /backups/
              env:
                - name: PGHOST
                  value: {{ printf "%s-postgresql" .Release.Name | quote }}
                - name: PGPORT
                  value: "5432"
                - name: PGUSER
                  value: "postgres"
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-postgresql" .Release.Name }}
                      key: postgres-password
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backup
{{- end }}
