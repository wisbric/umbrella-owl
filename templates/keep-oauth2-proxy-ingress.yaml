{{/*
Ingress for Keep oauth2-proxy endpoints.
Handles /oauth2/* paths (login, callback, auth validation).
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled .Values.keep.oauth2Proxy.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keep-oauth2-proxy
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-oauth2-proxy
  annotations:
    {{- with .Values.keep.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.keep.oauth2Proxy.hostname }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keep-oauth2-proxy
                port:
                  number: 4180
  {{- if .Values.keep.ingressTls }}
  tls:
    {{- toYaml .Values.keep.ingressTls | nindent 4 }}
  {{- end }}
{{- end }}
---
{{/*
Ingress for Keep frontend via nginx auth_request.
Routes / directly to the Keep frontend. nginx validates the oauth2-proxy
cookie via auth_request and forwards identity headers to the frontend.
This allows NextAuth to read proxy headers and create sessions correctly.
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled .Values.keep.oauth2Proxy.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keep-frontend
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-frontend
  annotations:
    {{- with .Values.keep.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ .Release.Name }}-keep-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://{{ .Values.keep.oauth2Proxy.hostname }}/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups,X-Forwarded-Email,X-Forwarded-Groups"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.keep.oauth2Proxy.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keep-frontend
                port:
                  number: 3000
  {{- if .Values.keep.ingressTls }}
  tls:
    {{- toYaml .Values.keep.ingressTls | nindent 4 }}
  {{- end }}
{{- end }}
---
{{/*
Ingress for Keep backend API via nginx auth_request.
Routes /backend/* directly to the Keep backend service.
nginx validates the oauth2-proxy cookie via auth_request and forwards
identity headers to the backend.
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled .Values.keep.oauth2Proxy.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keep-backend
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-backend
  annotations:
    {{- with .Values.keep.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/auth-url: "http://{{ .Release.Name }}-keep-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://{{ .Values.keep.oauth2Proxy.hostname }}/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups,X-Forwarded-Email,X-Forwarded-Groups"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.keep.oauth2Proxy.hostname }}
      http:
        paths:
          - path: /backend(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-keep-backend
                port:
                  number: 8080
          - path: /websocket(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-keep-websocket
                port:
                  number: 6001
  {{- if .Values.keep.ingressTls }}
  tls:
    {{- toYaml .Values.keep.ingressTls | nindent 4 }}
  {{- end }}
{{- end }}
