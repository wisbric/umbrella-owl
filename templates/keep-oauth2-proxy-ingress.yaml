{{/*
Ingress for Keep via oauth2-proxy
Routes all Keep traffic through the oauth2-proxy for SSO authentication.
The proxy handles /oauth2/* paths directly and forwards authenticated
requests to the Keep frontend.
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled .Values.keep.oauth2Proxy.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keep-oauth2-proxy
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-oauth2-proxy
  annotations:
    {{- with .Values.keep.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.keep.oauth2Proxy.hostname }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keep-oauth2-proxy
                port:
                  number: 4180
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-keep-oauth2-proxy
                port:
                  number: 4180
  {{- if .Values.keep.ingressTls }}
  tls:
    {{- toYaml .Values.keep.ingressTls | nindent 4 }}
  {{- end }}
{{- end }}
---
{{/*
Ingress for Keep backend API via nginx auth_request.
Routes /backend/* directly to the Keep backend service, bypassing the frontend
proxy. nginx validates the oauth2-proxy cookie via auth_request and forwards
identity headers (X-Auth-Request-Email, X-Forwarded-Email) to the backend.
This fixes 403 errors caused by the frontend dropping auth headers when proxying.
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled .Values.keep.oauth2Proxy.hostname }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-keep-backend
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-backend
  annotations:
    {{- with .Values.keep.ingressAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/auth-url: "http://{{ .Release.Name }}-keep-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://{{ .Values.keep.oauth2Proxy.hostname }}/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Keep's oauth2proxy auth verifier expects both x-forwarded-email and
      # x-forwarded-groups headers.
      auth_request_set $name_email $upstream_http_x_auth_request_email;
      auth_request_set $name_user  $upstream_http_x_auth_request_user;
      auth_request_set $name_groups $upstream_http_x_auth_request_groups;
      proxy_set_header X-Forwarded-Email              $name_email;
      proxy_set_header X-Forwarded-User               $name_user;
      proxy_set_header X-Forwarded-Groups             $name_groups;
      proxy_set_header X-Forwarded-Preferred-Username  $name_user;
      # Strip the NextAuth Bearer token — backend should auth via headers only
      proxy_set_header Authorization "";
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.keep.oauth2Proxy.hostname }}
      http:
        paths:
          - path: /backend(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-keep-backend
                port:
                  number: 8080
          - path: /websocket(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Release.Name }}-keep-websocket
                port:
                  number: 6001
  {{- if .Values.keep.ingressTls }}
  tls:
    {{- toYaml .Values.keep.ingressTls | nindent 4 }}
  {{- end }}
{{- end }}
