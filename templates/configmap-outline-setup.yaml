{{/*
Outline post-install setup — ConfigMap with idempotent SQL script.
Creates an API key for the Owlstack integration directly in the
Outline PostgreSQL database.
*/}}
{{- if and .Values.outline.enabled .Values.owlstack.secrets.outlineApiToken }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-outline-setup
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  setup.sql: |
    -- ================================================================
    -- Outline Setup — idempotent SQL for Owlstack integration
    -- ================================================================
    -- This script runs against the Outline PostgreSQL database and:
    --   1. Enables pgcrypto extension (for bcrypt)
    --   2. Creates an API key for the owlstack-integration service
    -- All operations use idempotency guards.
    -- ================================================================

    -- Ensure pgcrypto is available for bcrypt hashing.
    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    -- Insert API key for owlstack-integration (idempotent).
    -- Outline validates tokens against the 'secret' column (plaintext)
    -- or the 'hash' column (bcrypt). We store both for compatibility.
    INSERT INTO api_keys (id, name, secret, hash, "last4", "userId", "createdAt", "updatedAt")
    SELECT
      gen_random_uuid(),
      'owlstack-integration',
      :'api_token',
      crypt(:'api_token', gen_salt('bf', 10)),
      right(:'api_token', 4),
      u.id,
      now(),
      now()
    FROM users u
    WHERE u."isAdmin" = true
      AND NOT EXISTS (
        SELECT 1 FROM api_keys WHERE name = 'owlstack-integration' AND "deletedAt" IS NULL
      )
    LIMIT 1;
{{- end }}
