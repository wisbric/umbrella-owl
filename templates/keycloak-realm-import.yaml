{{/*
Keycloak realm bootstrap — post-install/post-upgrade hook
Creates a ConfigMap with:
  1) full realm JSON for first-time creation
  2) partial import JSON for idempotent client/client-scope updates
The Job imports/updates the realm via Keycloak admin REST API.
*/}}
{{- if and .Values.keycloak.enabled (default true .Values.keycloak.realmImport.enabled) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-keycloak-realm
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  owls-realm.json: |-
    {{- $realm := .Files.Get "keycloak/owls-realm.json" }}
    {{- $realm = $realm | replace "OWLSTACK_BASE_URL_PLACEHOLDER" (include "umbrella-owl.owlstackBaseUrl" .) }}
    {{- $realm = $realm | replace "KEEP_BASE_URL_PLACEHOLDER" (include "umbrella-owl.keepBaseUrl" .) }}
    {{- $realm = $realm | replace "OUTLINE_BASE_URL_PLACEHOLDER" (include "umbrella-owl.outlineBaseUrl" .) }}
    {{ $realm | nindent 4 }}
  owls-realm-partial.json: |-
    {{- $partial := .Files.Get "keycloak/owls-realm-partial.json" }}
    {{- $partial = $partial | replace "OWLSTACK_BASE_URL_PLACEHOLDER" (include "umbrella-owl.owlstackBaseUrl" .) }}
    {{- $partial = $partial | replace "KEEP_BASE_URL_PLACEHOLDER" (include "umbrella-owl.keepBaseUrl" .) }}
    {{- $partial = $partial | replace "OUTLINE_BASE_URL_PLACEHOLDER" (include "umbrella-owl.outlineBaseUrl" .) }}
    {{ $partial | nindent 4 }}
  {{- if .Values.keycloak.realmImport.includeSampleUsers }}
  owls-realm-lab-users.json: |-
    {{ .Files.Get "keycloak/owls-realm-lab-users.json" | nindent 4 }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-keycloak-realm-import
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-realm-import
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: import
          image: curlimages/curl:8.11.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              KEYCLOAK_URL="http://{{ .Release.Name }}-keycloak:80"
              escape_sed() {
                printf '%s' "$1" | sed -e 's/[|&]/\\&/g'
              }
              render_realm() {
                src="$1"
                dst="$2"
                cp "$src" "$dst"
                OWLSTACK_SECRET_ESCAPED=$(escape_sed "${OWLSTACK_OIDC_CLIENT_SECRET:-}")
                KEEP_SECRET_ESCAPED=$(escape_sed "${KEEP_OIDC_CLIENT_SECRET:-}")
                OUTLINE_SECRET_ESCAPED=$(escape_sed "${OUTLINE_OIDC_CLIENT_SECRET:-}")
                sed -i \
                  -e "s|NIGHTOWL_OIDC_SECRET_PLACEHOLDER|$OWLSTACK_SECRET_ESCAPED|g" \
                  -e "s|KEEP_OIDC_SECRET_PLACEHOLDER|$KEEP_SECRET_ESCAPED|g" \
                  -e "s|OUTLINE_OIDC_SECRET_PLACEHOLDER|$OUTLINE_SECRET_ESCAPED|g" \
                  "$dst"
              }

              render_realm /realm/owls-realm.json /tmp/owls-realm.json
              render_realm /realm/owls-realm-partial.json /tmp/owls-realm-partial.json

              # ---------------------------------------------------------------
              # Wait for Keycloak to be ready (up to 10 minutes)
              # ---------------------------------------------------------------
              echo "Waiting for Keycloak at $KEYCLOAK_URL ..."
              ATTEMPTS=0
              until curl -sf "$KEYCLOAK_URL/realms/master" >/dev/null 2>&1; do
                ATTEMPTS=$((ATTEMPTS + 1))
                if [ "$ATTEMPTS" -ge 60 ]; then
                  echo "ERROR: Keycloak not ready after 10 minutes"
                  exit 1
                fi
                echo "  Not ready yet (attempt $ATTEMPTS/60), retrying in 10s..."
                sleep 10
              done
              echo "Keycloak is ready."

              # ---------------------------------------------------------------
              # Authenticate as admin
              # ---------------------------------------------------------------
              echo "Authenticating as admin..."
              TOKEN_RESPONSE=$(curl -sf -X POST \
                "$KEYCLOAK_URL/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "username=$KEYCLOAK_ADMIN_USER" \
                -d "password=$KEYCLOAK_ADMIN_PASSWORD" \
                -d "grant_type=password" \
                -d "client_id=admin-cli")

              TOKEN=$(echo "$TOKEN_RESPONSE" | sed -n 's/.*"access_token"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')

              if [ -z "$TOKEN" ]; then
                echo "ERROR: Failed to get admin access token"
                exit 1
              fi
              echo "Authenticated."

              # ---------------------------------------------------------------
              # Check if realm already exists
              # ---------------------------------------------------------------
              REALM_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
                "$KEYCLOAK_URL/admin/realms/owls" \
                -H "Authorization: Bearer $TOKEN" || true)

              if [ "$REALM_STATUS" = "200" ]; then
                echo "Realm 'owls' already exists — applying partial import updates..."
                IMPORT_STATUS=$(curl -sf -o /tmp/response.txt -w "%{http_code}" \
                  -X POST "$KEYCLOAK_URL/admin/realms/owls/partialImport" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @/tmp/owls-realm-partial.json)

                case "$IMPORT_STATUS" in
                  200|201|204)
                    echo "Partial import applied successfully."
                    ;;
                  *)
                    echo "ERROR: Partial import failed (HTTP $IMPORT_STATUS)"
                    cat /tmp/response.txt 2>/dev/null || true
                    exit 1
                    ;;
                esac
                if [ "{{ ternary "true" "false" .Values.keycloak.realmImport.includeSampleUsers }}" = "true" ]; then
                  echo "Applying sample users import..."
                  USERS_STATUS=$(curl -sf -o /tmp/users-response.txt -w "%{http_code}" \
                    -X POST "$KEYCLOAK_URL/admin/realms/owls/partialImport" \
                    -H "Authorization: Bearer $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d @/realm/owls-realm-lab-users.json)
                  case "$USERS_STATUS" in
                    200|201|204)
                      echo "Sample users import applied successfully."
                      ;;
                    *)
                      echo "ERROR: Sample users import failed (HTTP $USERS_STATUS)"
                      cat /tmp/users-response.txt 2>/dev/null || true
                      exit 1
                      ;;
                  esac
                fi
                exit 0
              fi

              # ---------------------------------------------------------------
              # First-time realm import
              # ---------------------------------------------------------------
              echo "Importing realm 'owls'..."
              IMPORT_STATUS=$(curl -sf -o /tmp/response.txt -w "%{http_code}" \
                -X POST "$KEYCLOAK_URL/admin/realms" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d @/tmp/owls-realm.json)

              if [ "$IMPORT_STATUS" = "201" ]; then
                echo "Realm 'owls' imported successfully."
              else
                echo "ERROR: Realm import failed (HTTP $IMPORT_STATUS)"
                cat /tmp/response.txt 2>/dev/null || true
                exit 1
              fi
              if [ "{{ ternary "true" "false" .Values.keycloak.realmImport.includeSampleUsers }}" = "true" ]; then
                echo "Applying sample users import..."
                USERS_STATUS=$(curl -sf -o /tmp/users-response.txt -w "%{http_code}" \
                  -X POST "$KEYCLOAK_URL/admin/realms/owls/partialImport" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d @/realm/owls-realm-lab-users.json)
                case "$USERS_STATUS" in
                  200|201|204)
                    echo "Sample users import applied successfully."
                    ;;
                  *)
                    echo "ERROR: Sample users import failed (HTTP $USERS_STATUS)"
                    cat /tmp/users-response.txt 2>/dev/null || true
                    exit 1
                    ;;
                esac
              fi
          env:
            - name: KEYCLOAK_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-realm-import
                  key: admin-user
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak-realm-import
                  key: admin-password
            - name: OWLSTACK_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "umbrella-owl.owlstackSecretName" . }}
                  key: OIDC_CLIENT_SECRET
            - name: KEEP_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keep.secretName | default "keep-secrets" }}
                  key: OAUTH2_PROXY_CLIENT_SECRET
                  optional: true
            - name: OUTLINE_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.outline.secretName | default "outline-secrets" }}
                  key: OIDC_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: realm-config
              mountPath: /realm
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: realm-config
          configMap:
            name: {{ .Release.Name }}-keycloak-realm
{{- end }}
