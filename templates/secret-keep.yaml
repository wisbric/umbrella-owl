{{/*
Keep secrets — umbrella-managed K8s Secret
Avoids Helm array-merge issues with backend.env / frontend.env by using
envFromSecret references instead of inline env arrays for sensitive values.
*/}}
{{- if .Values.keep.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.keep.secretName | default "keep-secrets" }}
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep
type: Opaque
stringData:
  DATABASE_CONNECTION_STRING: {{ required "keep.secrets.databaseConnectionString is required when keep.enabled=true" .Values.keep.secrets.databaseConnectionString | quote }}
  NEXTAUTH_SECRET: {{ required "keep.secrets.nextauthSecret is required when keep.enabled=true" .Values.keep.secrets.nextauthSecret | quote }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ required "keep.oidcClientSecret is required when keep.enabled=true" .Values.keep.oidcClientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ required "keep.oauth2Proxy.cookieSecret is required when keep.oauth2Proxy.enabled=true" .Values.keep.oauth2Proxy.cookieSecret | quote }}
  KEEP_API_KEY: {{ .Values.keep.secrets.keepApiKey | quote }}
  {{- if .Values.keep.secrets.keepApiKey }}
  KEEP_DEFAULT_API_KEYS: {{ printf "vector:webhook:%s%s" .Values.keep.secrets.keepApiKey (ternary (printf ",nightowl:admin:%s" .Values.keep.secrets.keepAdminApiKey) "" (ne (.Values.keep.secrets.keepAdminApiKey | default "") "")) | quote }}
  {{- end }}
{{- end }}
