{{/*
oauth2-proxy for Keep SSO — Deployment + Service
Keep OSS does not support AUTH_TYPE=KEYCLOAK (Enterprise-only).
This proxy sits in front of Keep and handles Keycloak OIDC authentication,
passing user headers (X-Auth-Request-User, X-Auth-Request-Email) to Keep.
*/}}
{{- if and .Values.keep.enabled .Values.keep.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keep-oauth2-proxy
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keep-oauth2-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keep-oauth2-proxy
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: keep-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url={{ .Values.keep.oauth2Proxy.issuerUrl }}
            - --client-id={{ .Values.keep.oauth2Proxy.clientId }}
            - --redirect-url=https://{{ .Values.keep.oauth2Proxy.hostname }}/oauth2/callback
            - --upstream=http://{{ .Release.Name }}-keep-frontend:3000
            - --http-address=0.0.0.0:4180
            - --email-domain=*
            - --pass-user-headers=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --cookie-secure=true
            - --cookie-name=_keep_oauth2
            - --skip-provider-button=true
            - --scope=openid profile email groups
            - --oidc-groups-claim=groups
            - --oidc-audience-claim=azp
            {{- if .Values.keep.oauth2Proxy.skipTlsVerify }}
            - --ssl-insecure-skip-verify=true
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              value: {{ .Values.keep.oidcClientSecret | quote }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              value: {{ .Values.keep.oauth2Proxy.cookieSecret | quote }}
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          {{- if .Values.keep.oauth2Proxy.skipTlsVerify }}
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/ssl/certs/ca-certificates.crt
              subPath: ca-certificates.crt
              readOnly: true
          {{- end }}
      {{- if .Values.keep.oauth2Proxy.skipTlsVerify }}
      volumes:
        - name: ca-bundle
          configMap:
            name: combined-ca-bundle
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-keep-oauth2-proxy
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: keep-oauth2-proxy
spec:
  type: ClusterIP
  ports:
    - port: 4180
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: keep-oauth2-proxy
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
