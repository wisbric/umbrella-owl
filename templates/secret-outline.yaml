{{/*
Outline secrets — umbrella-managed K8s Secret
Injected via outline.environmentFrom[].secretRef to avoid Helm array-merge
issues with the environment list.
*/}}
{{- if .Values.outline.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.outline.secretName | default "outline-secrets" }}
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
    app.kubernetes.io/component: outline
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.outline.secrets.secretKey | quote }}
  UTILS_SECRET: {{ .Values.outline.secrets.utilsSecret | quote }}
  DATABASE_URL: {{ .Values.outline.secrets.databaseUrl | quote }}
  REDIS_URL: {{ .Values.outline.secrets.redisUrl | quote }}
  OIDC_CLIENT_SECRET: {{ .Values.outline.secrets.oidcClientSecret | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.outline.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.outline.secrets.awsSecretAccessKey | quote }}
{{- end }}
