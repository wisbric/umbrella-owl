{{/*
DNS aliases so hardcoded frontend nginx upstreams can resolve.
owlstack-web container uses proxy_pass http://nightowl-api:8080
*/}}
apiVersion: v1
kind: Service
metadata:
  name: nightowl-api
  labels:
    {{- include "umbrella-owl.labels" . | nindent 4 }}
spec:
  type: ExternalName
  externalName: {{ .Release.Name }}-owlstack.{{ .Release.Namespace }}.svc.cluster.local
