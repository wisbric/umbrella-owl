{{- if .Values.externalSecrets.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.store.serviceAccountName }}
  namespace: {{ .Release.Namespace }}
---
{{- if not .Values.externalSecrets.skipCaCopy }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-ca-reader
  namespace: {{ .Values.externalSecrets.store.caCertSourceNamespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.externalSecrets.store.caCertSourceSecret | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-ca-reader
  namespace: {{ .Values.externalSecrets.store.caCertSourceNamespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.externalSecrets.store.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: openbao-ca-reader
  apiGroup: rbac.authorization.k8s.io
---
# Role in release namespace for the Job to create/update the CA cert secret
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-ca-writer
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.externalSecrets.store.caCertSecretName | quote }}]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-ca-writer
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.externalSecrets.store.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: openbao-ca-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: copy-openbao-ca
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: {{ .Values.externalSecrets.store.serviceAccountName }}
      restartPolicy: Never
      containers:
        - name: copy-ca
          image: bitnami/kubectl:1.34
          command:
            - /bin/sh
            - -ec
            - |
              CA_CERT=$(kubectl get secret {{ .Values.externalSecrets.store.caCertSourceSecret }} \
                -n {{ .Values.externalSecrets.store.caCertSourceNamespace }} \
                -o jsonpath='{.data.ca\.crt}')
              kubectl create secret generic {{ .Values.externalSecrets.store.caCertSecretName }} \
                -n {{ .Release.Namespace }} \
                --from-literal=ca.crt="$(echo "$CA_CERT" | base64 -d)" \
                --dry-run=client -o yaml | kubectl apply -f -
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
{{- end }}
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.store.server | quote }}
      path: {{ .Values.externalSecrets.store.path | quote }}
      version: v2
      {{- if not .Values.externalSecrets.skipCaCopy }}
      caProvider:
        type: Secret
        name: {{ .Values.externalSecrets.store.caCertSecretName }}
        key: ca.crt
      {{- end }}
      auth:
        kubernetes:
          mountPath: {{ .Values.externalSecrets.store.authPath }}
          role: {{ .Values.externalSecrets.store.role }}
          serviceAccountRef:
            name: {{ .Values.externalSecrets.store.serviceAccountName }}
{{- end }}
