{{- if and .Values.externalSecrets.enabled .Values.registryCredentials.create }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitlab-registry
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: gitlab-registry
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"registry.gitlab.com":{"username":"{{`{{ .username }}`}}","password":"{{`{{ .password }}`}}","auth":"{{`{{ printf "%s:%s" .username .password | b64enc }}`}}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: platform/owl/registry
        property: username
    - secretKey: password
      remoteRef:
        key: platform/owl/registry
        property: password
{{- end }}
