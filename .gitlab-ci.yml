stages:
  - lint
  - release

variables:
  # Project-level OCI registry for publishing this chart
  OCI_REGISTRY: "oci://${CI_REGISTRY_IMAGE}/charts"
  # Owlstack chart OCI path (published by owlstack CI)
  OWLSTACK_OCI: "oci://registry.gitlab.com/adfinisde/agentic-workspace/ai-ops/owlstack/charts"

default:
  image:
    name: alpine/helm:3.17.0
    entrypoint: [""]

# Stub owlstack chart for lint (file:// dep can't resolve in CI)
.helm-setup-stub: &helm-setup-stub
  - |
    mkdir -p ../owlstack/deploy/helm/owlstack/templates
    cat > ../owlstack/deploy/helm/owlstack/Chart.yaml << 'EOF'
    apiVersion: v2
    name: owlstack
    version: "0.4.0"
    description: Stub chart for CI lint
    EOF
    sed -i 's/^    //' ../owlstack/deploy/helm/owlstack/Chart.yaml
    touch ../owlstack/deploy/helm/owlstack/values.yaml
  - helm repo add zammad https://zammad.github.io/zammad-helm
  - helm repo add keephq https://keephq.github.io/helm-charts
  - helm repo add lrstanley https://helm.liam.sh
  - helm repo add derwitt https://charts.derwitt.dev
  - helm repo add vector https://helm.vector.dev
  - helm repo update

lint:
  stage: lint
  before_script:
    - *helm-setup-stub
  script:
    - helm dep build .
    - helm lint .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

release:
  stage: release
  before_script:
    - helm repo add zammad https://zammad.github.io/zammad-helm
    - helm repo add keephq https://keephq.github.io/helm-charts
    - helm repo add lrstanley https://helm.liam.sh
    - helm repo add derwitt https://charts.derwitt.dev
    - helm repo add vector https://helm.vector.dev
    - helm repo update
    - helm registry login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Releasing version ${VERSION}"

      # Update chart version
      sed -i "s|^version:.*|version: \"$VERSION\"|" Chart.yaml
      sed -i "s|^appVersion:.*|appVersion: \"$VERSION\"|" Chart.yaml

      # Switch owlstack dependency from file:// to OCI (owlstack project registry)
      sed -i "/name: owlstack/,/repository:/{
        s|version: .*|version: \"$VERSION\"|
        s|repository: .*|repository: ${OWLSTACK_OCI}|
      }" Chart.yaml

      echo "--- Chart.yaml after patching ---"
      cat Chart.yaml

      helm dep update .
      helm lint .
      helm package . --destination /tmp/charts
      helm push "/tmp/charts/umbrella-owl-${VERSION}.tgz" "${OCI_REGISTRY}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
