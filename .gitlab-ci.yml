stages:
  - lint
  - release

variables:
  OCI_REGISTRY: "oci://registry.gitlab.com/adfinisde/agentic-workspace/charts"

default:
  image:
    name: alpine/helm:3.17.0
    entrypoint: [""]

.helm-setup: &helm-setup
  - |
    mkdir -p ../owlstack/deploy/helm/owlstack/templates
    cat > ../owlstack/deploy/helm/owlstack/Chart.yaml << 'STUBEOF'
    apiVersion: v2
    name: owlstack
    version: "0.3.0"
    description: Stub chart for CI dependency resolution
    STUBEOF
    touch ../owlstack/deploy/helm/owlstack/values.yaml
  - helm repo add zammad https://zammad.github.io/zammad-helm
  - helm repo add keephq https://keephq.github.io/helm-charts
  - helm repo add lrstanley https://helm.liam.sh
  - helm repo add derwitt https://charts.derwitt.dev
  - helm repo add vector https://helm.vector.dev
  - helm repo update

lint:
  stage: lint
  before_script:
    - *helm-setup
  script:
    - helm dep build .
    - helm lint .
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

release:
  stage: release
  before_script:
    - *helm-setup
    - helm registry login -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}" "${CI_REGISTRY}"
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      echo "Releasing version ${VERSION}"
      sed -i "s|^version:.*|version: \"$VERSION\"|" Chart.yaml
      sed -i "/name: owlstack/,/repository:/{s/version: .*/version: \"$VERSION\"/}" Chart.yaml
      helm dep build .
      helm lint .
      helm package . --destination /tmp/charts
      helm push "/tmp/charts/umbrella-owl-${VERSION}.tgz" "${OCI_REGISTRY}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
