# =============================================================================
# umbrella-owl — Dev / Staging overrides
# =============================================================================
# Layered on top of values.yaml:
#   helm install owl . -f values-dev.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# Owlstack — Unified operations platform
# -----------------------------------------------------------------------------
owlstack:
  replicaCount:
    api: 1
    worker: 1

  image:
    tag: main  # track latest main branch build
    pullPolicy: Always

  frontend:
    enabled: true
    image:
      tag: main
      pullPolicy: Always
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  api:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  worker:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 125m
        memory: 128Mi

  config:
    logLevel: debug
    corsAllowedOrigins: "*"

  secrets:
    databaseUrl: "postgres://nightowl:changeme@owl-postgresql:5432/nightowl?sslmode=disable"
    redisUrl: "redis://owl-redis-master:6379/0"

  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: nightowl.dev.example.com
        paths:
          - path: /api
            pathType: Prefix
            service: api
          - path: /auth
            pathType: Prefix
            service: api
          - path: /status
            pathType: Prefix
            service: api
          - path: /healthz
            pathType: Prefix
            service: api
          - path: /metrics
            pathType: Prefix
            service: api
          - path: /
            pathType: Prefix
            service: frontend
    tls: []

  serviceMonitor:
    enabled: false

  podDisruptionBudget:
    enabled: false

# -----------------------------------------------------------------------------
# PostgreSQL
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    postgresPassword: "dev-postgres-password"
    database: nightowl
  primary:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# -----------------------------------------------------------------------------
# Redis
# -----------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 125m
        memory: 128Mi

# -----------------------------------------------------------------------------
# Keycloak — disabled in dev (use local admin auth)
# -----------------------------------------------------------------------------
keycloak:
  enabled: false

# -----------------------------------------------------------------------------
# Zammad — disabled in dev by default
# -----------------------------------------------------------------------------
zammad:
  enabled: false

# -----------------------------------------------------------------------------
# Keep — disabled in dev by default
# -----------------------------------------------------------------------------
keep:
  enabled: false

# -----------------------------------------------------------------------------
# Outline — disabled in dev by default
# -----------------------------------------------------------------------------
outline:
  enabled: false

# -----------------------------------------------------------------------------
# Garage — disabled in dev by default
# -----------------------------------------------------------------------------
garage:
  enabled: false
