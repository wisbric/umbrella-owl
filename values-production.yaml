# =============================================================================
# umbrella-owl — Production overrides
# =============================================================================
# Layered on top of values.yaml:
#   helm install owl . -f values-production.yaml --set ...
#
# IMPORTANT: All secrets marked OVERRIDE below must be provided at install time
# via --set, external-secrets-operator, or sealed-secrets. Never commit real
# credentials to this file.
# =============================================================================

# -----------------------------------------------------------------------------
# Owlstack — Unified operations platform
# -----------------------------------------------------------------------------
owlstack:
  replicaCount:
    api: 3
    worker: 2

  image:
    tag: ""  # OVERRIDE — pin to release tag (e.g. v1.0.0)

  frontend:
    enabled: true
    image:
      tag: ""  # OVERRIDE — pin to release tag
    replicas: 2
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  api:
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 512Mi

  worker:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  config:
    logLevel: info
    logFormat: json
    corsAllowedOrigins: ""  # OVERRIDE (e.g. https://nightowl.example.com)
    zammadUrl: ""           # OVERRIDE (e.g. http://owl-zammad:8080)
    outlineUrl: ""          # OVERRIDE (e.g. https://outline.example.com)

  secrets:
    databaseUrl: ""       # OVERRIDE
    redisUrl: ""          # OVERRIDE
    oidcIssuerUrl: ""     # OVERRIDE
    oidcClientId: ""      # OVERRIDE
    oidcClientSecret: ""  # OVERRIDE
    sessionSecret: ""     # OVERRIDE
    encryptionKey: ""     # OVERRIDE
    zammadToken: ""       # OVERRIDE
    outlineApiToken: ""   # OVERRIDE

  ingress:
    enabled: true
    className: nginx
    annotations:
      certmanager.step.sm/cluster-issuer: step-cluster-issuer
    hosts:
      - host: nightowl.example.com
        paths:
          - path: /api
            pathType: Prefix
            service: api
          - path: /auth
            pathType: Prefix
            service: api
          - path: /status
            pathType: Prefix
            service: api
          - path: /healthz
            pathType: Prefix
            service: api
          - path: /metrics
            pathType: Prefix
            service: api
          - path: /
            pathType: Prefix
            service: frontend
    tls:
      - secretName: nightowl-tls
        hosts:
          - nightowl.example.com

  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# -----------------------------------------------------------------------------
# PostgreSQL — disabled in production (use managed PostgreSQL)
# -----------------------------------------------------------------------------
postgresql:
  enabled: false

# -----------------------------------------------------------------------------
# Redis — disabled in production (use managed Redis)
# -----------------------------------------------------------------------------
redis:
  enabled: false

# -----------------------------------------------------------------------------
# Keycloak — enabled in production
# -----------------------------------------------------------------------------
keycloak:
  enabled: true
  auth:
    adminUser: admin
    adminPassword: ""  # OVERRIDE
  postgresql:
    enabled: false
  externalDatabase:
    host: ""     # OVERRIDE — point to managed PostgreSQL
    port: 5432
    database: keycloak
    user: keycloak
    password: ""  # OVERRIDE

# -----------------------------------------------------------------------------
# Zammad — enabled in production
# -----------------------------------------------------------------------------
zammad:
  enabled: true
  owlstackToken: ""  # OVERRIDE

# -----------------------------------------------------------------------------
# Keep — AIOps alert management
# -----------------------------------------------------------------------------
keep:
  enabled: true
  oidcClientSecret: ""  # OVERRIDE
  secretName: keep-secrets  # OVERRIDE if running multiple releases in one namespace
  secrets:
    databaseConnectionString: ""  # OVERRIDE
    nextauthSecret: ""            # OVERRIDE
  oauth2Proxy:
    enabled: true
    clientId: keep
    issuerUrl: ""       # OVERRIDE (e.g. https://keycloak.example.com/realms/owls)
    hostname: ""        # OVERRIDE (e.g. keep.example.com)
    cookieSecret: ""    # OVERRIDE
  database:
    enabled: false
  backend:
    envFromSecret: keep-secrets
  frontend:
    envFromSecret: keep-secrets
  global:
    ingress:
      enabled: false

# -----------------------------------------------------------------------------
# Outline — collaborative wiki
# -----------------------------------------------------------------------------
outline:
  enabled: true
  oidcClientSecret: ""  # OVERRIDE
  secretName: outline-secrets  # OVERRIDE if running multiple releases in one namespace
  secrets:
    secretKey: ""           # OVERRIDE
    utilsSecret: ""         # OVERRIDE
    databaseUrl: ""         # OVERRIDE
    redisUrl: ""            # OVERRIDE
    oidcClientSecret: ""    # OVERRIDE
    awsAccessKeyId: ""      # OVERRIDE
    awsSecretAccessKey: ""  # OVERRIDE
  postgresql:
    enabled: false
  minio:
    enabled: false
  dex:
    enabled: false
  redis:
    enabled: false
  cnpg:
    enabled: false
  outline:
    generateEncryptionKeys: false
    url: ""                 # OVERRIDE (e.g. https://outline.example.com)
  environmentFrom:
    - secretRef:
        name: outline-secrets
  ingress:
    enabled: true

# -----------------------------------------------------------------------------
# Outline setup automation
# -----------------------------------------------------------------------------
outlineSetup:
  hook:
    enabled: true
    failSoftNoAdmin: true
  retryCron:
    enabled: true
    schedule: "*/10 * * * *"

# -----------------------------------------------------------------------------
# Garage — S3-compatible storage
# -----------------------------------------------------------------------------
garage:
  enabled: true
  garage:
    replicationFactor: "3"  # Production: 3-way replication
  deployment:
    replicaCount: 3
  persistence:
    meta:
      size: 5Gi
    data:
      size: 100Gi

# -----------------------------------------------------------------------------
# Backup — Daily PostgreSQL backups
# -----------------------------------------------------------------------------
backup:
  enabled: true
  schedule: "0 2 * * *"
  storageSize: 20Gi
  retentionDays: 30
  databases:
    - nightowl
    - keep
    - outline
    # keycloak runs on external DB in production; back it up with provider-native tooling.

# -----------------------------------------------------------------------------
# Network Policies — Restrict pod-to-pod communication
# -----------------------------------------------------------------------------
networkPolicies:
  enabled: true
  ingressControllerNamespace: ingress-nginx
