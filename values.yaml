# =============================================================================
# umbrella-owl — Base values
# =============================================================================
# Each top-level key corresponds to a subchart name. Values under that key are
# passed directly to the subchart. See each subchart's values.yaml for the full
# list of options.
# =============================================================================

# -----------------------------------------------------------------------------
# GHCR registry credentials — shared imagePullSecret for all owl sub-charts
# The password should be a GitHub PAT with read:packages scope.
# For lab: set username/password via values.lab-secrets.yaml
# For production: inject via external-secrets-operator or --set
# -----------------------------------------------------------------------------
registryCredentials:
  create: false
  secretName: ghcr-credentials
  registry: ghcr.io
  username: ""
  password: ""

# -----------------------------------------------------------------------------
# Owlstack — Unified operations platform (NightOwl + TicketOwl merged)
# Chart: owlstack/deploy/helm/owlstack
# Source values: owlstack/deploy/helm/owlstack/values.yaml
# -----------------------------------------------------------------------------
owlstack:
  imagePullSecrets:
    - name: ghcr-credentials

  replicaCount:
    api: 2
    worker: 1

  image:
    repository: ghcr.io/wisbric/owlstack
    pullPolicy: IfNotPresent
    tag: ""

  frontend:
    enabled: true
    image:
      repository: ghcr.io/wisbric/owlstack-web
      pullPolicy: IfNotPresent
      tag: ""
    replicas: 1
    service:
      type: ClusterIP
      port: 80
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  api:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  worker:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  config:
    logLevel: info
    logFormat: json
    corsAllowedOrigins: ""
    metricsPath: /metrics
    workerPollSeconds: "60"
    zammadUrl: ""
    outlineUrl: ""
    outlineRunbookCollection: ""
    outlinePostMortemCollection: ""

  secrets:
    create: true
    existingSecret: ""
    databaseUrl: ""
    redisUrl: ""
    oidcIssuerUrl: ""
    oidcClientId: ""
    oidcClientSecret: ""
    sessionSecret: ""
    slackBotToken: ""
    slackSigningSecret: ""
    slackAlertChannel: ""
    encryptionKey: ""
    zammadToken: ""
    outlineApiToken: ""

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  ingress:
    enabled: false
    className: nginx
    annotations: {}
    hosts:
      - host: nightowl.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

# -----------------------------------------------------------------------------
# PostgreSQL (Bitnami) — Shared database
# Chart: oci://registry-1.docker.io/bitnamicharts/postgresql
# Set enabled: false to use an external PostgreSQL instance instead
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    postgresPassword: ""       # MUST override — no default
    database: nightowl
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    initdb:
      scripts:
        # Create databases and users for owl apps
        create-databases.sql: |
          CREATE DATABASE nightowl;
          CREATE USER nightowl WITH PASSWORD 'changeme';
          GRANT ALL PRIVILEGES ON DATABASE nightowl TO nightowl;

# -----------------------------------------------------------------------------
# Redis (Bitnami) — Shared cache, sessions, event queues
# Chart: oci://registry-1.docker.io/bitnamicharts/redis
# Set enabled: false to use an external Redis instance instead
# -----------------------------------------------------------------------------
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
  master:
    persistence:
      size: 2Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# -----------------------------------------------------------------------------
# Keycloak (Bitnami) — OIDC identity provider
# Chart: oci://registry-1.docker.io/bitnamicharts/keycloak
# Docs: https://artifacthub.io/packages/helm/bitnami/keycloak
# Set enabled: false to use an external OIDC provider instead
# -----------------------------------------------------------------------------
keycloak:
  enabled: false
  auth:
    adminUser: admin
    adminPassword: ""          # MUST override — no default
  production: false
  proxyHeaders: xforwarded     # TLS terminated at ingress
  httpRelativePath: /
  postgresql:
    enabled: false             # Use the shared PostgreSQL instance
  externalDatabase:
    host: ""
    port: 5432
    database: keycloak
    user: keycloak
    password: ""
  ingress:
    enabled: false
    hostname: keycloak.example.com
    ingressClassName: nginx
    tls: false
    annotations: {}
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # Realm import — the umbrella chart includes a post-install Job
  # (templates/keycloak-realm-import.yaml) that imports keycloak/owls-realm.json.
  # Set realmImport.enabled: false to skip automatic realm bootstrap.
  realmImport:
    enabled: true

# -----------------------------------------------------------------------------
# Zammad — Ticket engine backend
# Chart: https://zammad.github.io/zammad-helm
# Set enabled: false if tenants bring their own Zammad instances
# -----------------------------------------------------------------------------
zammad:
  enabled: false
  # API token for the Owlstack service user in Zammad.
  # Used by the post-install setup job to create a persistent token.
  owlstackToken: ""
  # Zammad bundles its own Redis subchart. The top-level Bitnami Redis
  # helpers leak into Zammad's Redis context (Helm template name collision).
  # Provide the missing sentinel value to prevent nil-pointer errors.
  redis:
    sentinel:
      masterService:
        enabled: false

# -----------------------------------------------------------------------------
# Keep (keephq.dev) — AIOps alert management
# Chart: https://keephq.github.io/helm-charts
# SSO via oauth2-proxy (Keep OSS does not support AUTH_TYPE=KEYCLOAK)
# Set enabled: false to use Keep as an external service
# -----------------------------------------------------------------------------
keep:
  enabled: false
  # OIDC client secret for Keycloak realm import
  oidcClientSecret: ""
  # Name for umbrella-managed Keep secret
  secretName: keep-secrets
  # Secrets managed by umbrella chart (templates/secret-keep.yaml)
  secrets:
    databaseConnectionString: ""  # postgresql+psycopg2://keep:<pw>@owl-postgresql:5432/keep
    nextauthSecret: ""
    keepApiKey: ""                  # API key for Vector → Keep alert ingestion
  # oauth2-proxy sidecar for SSO (templates/keep-oauth2-proxy.yaml)
  oauth2Proxy:
    enabled: true
    clientId: keep
    issuerUrl: ""
    hostname: ""
    cookieSecret: ""
    skipTlsVerify: false
  # Disable Keep's internal database — use shared PostgreSQL
  database:
    enabled: false
  backend:
    waitForDatabase:
      enabled: false
    env:
      - name: AUTH_TYPE
        value: OAUTH2PROXY
      - name: KEEP_OAUTH2_PROXY_ADMIN_ROLES
        value: "admin,admins"
      - name: KEEP_OAUTH2_PROXY_NOC_ROLES
        value: "noc,member,members"
      - name: KEEP_OAUTH2_PROXY_WEBHOOK_ROLES
        value: "webhook"
      - name: SECRET_MANAGER_TYPE
        value: k8s
      - name: PORT
        value: "8080"
      - name: PUSHER_APP_ID
        value: "1"
      - name: PUSHER_APP_KEY
        value: keepappkey
      - name: PUSHER_APP_SECRET
        value: keepappsecret
      - name: PUSHER_HOST
        value: keep-websocket
      - name: PUSHER_PORT
        value: "6001"
    envFromSecret: keep-secrets
  frontend:
    env:
      - name: AUTH_TYPE
        value: OAUTH2PROXY
      - name: KEEP_OAUTH2_PROXY_USER_HEADER
        value: x-forwarded-email
      - name: KEEP_OAUTH2_PROXY_ROLE_HEADER
        value: x-forwarded-groups
      - name: NEXTAUTH_SECRET
        value: "changeme"
      - name: VERCEL
        value: "1"
      - name: ENV
        value: production
      - name: NODE_ENV
        value: production
      - name: HOSTNAME
        value: 0.0.0.0
      - name: PUSHER_APP_KEY
        value: "keepappkey"
      - name: FRIGADE_DISABLED
        value: "true"
    envFromSecret: keep-secrets
  websocket:
    enabled: true
  global:
    ingress:
      enabled: false

# -----------------------------------------------------------------------------
# Outline (getoutline.com) — Collaborative wiki, replaces BookOwl
# Chart: https://helm.liam.sh (lrstanley)
# OIDC directly against Keycloak, S3 via Garage
# Set enabled: false to use Outline as an external service
# -----------------------------------------------------------------------------
outline:
  enabled: false
  # OIDC client secret for Keycloak realm import
  oidcClientSecret: ""
  # Name for umbrella-managed Outline secret
  secretName: outline-secrets
  # Secrets managed by umbrella chart (templates/secret-outline.yaml)
  secrets:
    secretKey: ""
    utilsSecret: ""
    databaseUrl: ""       # postgres://outline:<pw>@owl-postgresql:5432/outline?sslmode=disable
    redisUrl: ""          # redis://:@owl-redis-master:6379/3
    oidcClientSecret: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
  # Disable bundled subcharts — use shared infrastructure
  postgresql:
    enabled: false
  minio:
    enabled: false
  dex:
    enabled: false
  redis:
    enabled: false
  cnpg:
    enabled: false
  # Outline app settings
  outline:
    generateEncryptionKeys: false  # We manage secrets via umbrella chart
    url: ""
    fileStorage:
      system: s3
  environment: []       # Non-secret env vars (OIDC, S3, etc.)
  environmentFrom:
    - secretRef:
        name: outline-secrets
  ingress:
    enabled: false

# -----------------------------------------------------------------------------
# Garage — S3-compatible storage for Outline uploads
# Chart: https://charts.derwitt.dev
# Set enabled: false to use an external S3-compatible store
# -----------------------------------------------------------------------------
garage:
  enabled: false
  garage:
    replicationFactor: "1"      # Single-node lab deployment
    s3:
      api:
        region: garage
        rootDomain: ".s3.garage.tld"
  deployment:
    replicaCount: 1
  persistence:
    meta:
      size: 1Gi
    data:
      size: 10Gi

# -----------------------------------------------------------------------------
# Vector (vector.dev) — Log/metric pipeline for alert ingestion into Keep
# Chart: https://helm.vector.dev
# Set enabled: true to deploy Vector for synthetic/real alert forwarding
# -----------------------------------------------------------------------------
vector:
  enabled: false
  role: Agent
  # Agent role has no inbound ports — disable the Service
  service:
    enabled: false

# -----------------------------------------------------------------------------
# Backup — Automated PostgreSQL backups via CronJob
# -----------------------------------------------------------------------------
backup:
  enabled: false
  schedule: "0 2 * * *"          # Daily at 2 AM
  storageClass: longhorn
  storageSize: 5Gi
  retentionDays: 7
  databases:
    - nightowl
    - keycloak
    - keep
    - outline

# -----------------------------------------------------------------------------
# Network Policies — Restrict pod-to-pod communication
# -----------------------------------------------------------------------------
networkPolicies:
  enabled: false
  ingressControllerNamespace: ingress-nginx

# -----------------------------------------------------------------------------
# Global values — passed to all subcharts automatically by Helm
# -----------------------------------------------------------------------------
global:
  oidc:
    # OIDC issuer URL shared by all owl services.
    # Each subchart falls back to this value when its own issuer is empty.
    # Example: "https://keycloak.example.com/realms/owls"
    issuerUrl: ""

nameOverride: ""
fullnameOverride: ""
