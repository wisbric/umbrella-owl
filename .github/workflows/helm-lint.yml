name: Helm Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add external Helm repos
        run: |
          helm repo add zammad https://zammad.github.io/zammad-helm
          helm repo add keephq https://keephq.github.io/helm-charts
          helm repo add lrstanley https://helm.liam.sh
          helm repo add derwitt https://charts.derwitt.dev
          helm repo update

      # ---------------------------------------------------------------
      # Build and lint umbrella chart
      # ---------------------------------------------------------------
      - name: Build umbrella dependencies
        run: helm dep build .

      - name: Lint umbrella
        run: helm lint .

      # ---------------------------------------------------------------
      # Dry-run template rendering with lab values
      # Uses a stub secrets file so gitignored values.lab-secrets.yaml
      # is not required.
      # ---------------------------------------------------------------
      - name: Create stub secrets for dry-run
        run: |
          cat > /tmp/values-stub-secrets.yaml << 'STUBEOF'
          registryCredentials:
            username: "stub"
            password: "stub"
          owlstack:
            secrets:
              databaseUrl: "postgres://stub:stub@localhost/nightowl"
              redisUrl: "redis://localhost:6379/0"
              sessionSecret: "stub-session-secret"
              oidcClientSecret: "stub-oidc-secret"
              encryptionKey: "stub-encryption-key"
              zammadToken: "stub-zammad-token"
          postgresql:
            auth:
              postgresPassword: "stub"
          redis:
            auth:
              password: "stub"
          keycloak:
            auth:
              adminPassword: "stub"
            externalDatabase:
              password: "stub"
          zammad:
            owlstackToken: "stub-token"
            zammadConfig:
              postgresql:
                pass: "stub"
              redis:
                pass: "stub"
          keep:
            oidcClientSecret: "stub"
            secrets:
              databaseConnectionString: "postgresql+psycopg2://stub:stub@localhost/keep"
              nextauthSecret: "stub"
            oauth2Proxy:
              cookieSecret: "stub"
          outline:
            oidcClientSecret: "stub"
            secrets:
              secretKey: "stub"
              utilsSecret: "stub"
              databaseUrl: "postgres://stub:stub@localhost/outline"
              redisUrl: "redis://localhost:6379/3"
              oidcClientSecret: "stub"
          STUBEOF

      - name: Dry-run helm template
        run: helm template owl . -f values.lab.yaml -f /tmp/values-stub-secrets.yaml --dry-run > /dev/null
