name: Helm Release

on:
  push:
    tags:
      - "v*"

permissions:
  packages: write
  contents: read

env:
  OCI_REGISTRY: oci://ghcr.io/wisbric/charts

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout owlstack (for local chart dependency)
        uses: actions/checkout@v4
        with:
          repository: wisbric/owlstack
          path: owlstack-checkout
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Symlink owlstack to expected relative path
        run: ln -s "$GITHUB_WORKSPACE/owlstack-checkout" ../owlstack

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Add external Helm repos
        run: |
          helm repo add zammad https://zammad.github.io/zammad-helm
          helm repo add keephq https://keephq.github.io/helm-charts
          helm repo add lrstanley https://helm.liam.sh
          helm repo add derwitt https://charts.derwitt.dev
          helm repo update

      # ---------------------------------------------------------------
      # Pin Chart.yaml versions to the release tag
      # ---------------------------------------------------------------
      - name: Pin chart versions
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i "s|^version:.*|version: \"$VERSION\"|" Chart.yaml
          sed -i "/name: owlstack/,/repository:/{s/version: .*/version: \"$VERSION\"/}" Chart.yaml

      - name: Build umbrella dependencies
        run: helm dep build .

      - name: Lint umbrella
        run: helm lint .

      - name: Package umbrella
        run: helm package . --destination /tmp/charts

      - name: Push umbrella
        run: helm push /tmp/charts/umbrella-owl-${{ steps.version.outputs.VERSION }}.tgz ${{ env.OCI_REGISTRY }}

  summary:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Print published charts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "### Published Helm charts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Chart | OCI URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| umbrella-owl | \`oci://ghcr.io/wisbric/charts/umbrella-owl:${VERSION}\` |" >> "$GITHUB_STEP_SUMMARY"
