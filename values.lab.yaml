# =============================================================================
# umbrella-owl — Lab environment overrides
# =============================================================================
# Layered on top of values.yaml:
#   helm install owl . -f values.lab.yaml -f values.lab-secrets.yaml
#
# This file contains structural configuration only (hostnames, replicas,
# resources, ingress rules, inter-service URLs). All secrets are left empty
# and must be provided via values.lab-secrets.yaml (generated by
# deploy/apply-secrets.sh).
# =============================================================================

# -----------------------------------------------------------------------------
# Global — shared OIDC config for all owl services
# -----------------------------------------------------------------------------
global:
  oidc:
    issuerUrl: "https://keycloak.devops.lab/realms/owls"

# -----------------------------------------------------------------------------
# GHCR registry credentials — pull private container images and Helm charts
# -----------------------------------------------------------------------------
registryCredentials:
  create: true
  username: ""    # Set via values.lab-secrets.yaml
  password: ""    # Set via values.lab-secrets.yaml

# -----------------------------------------------------------------------------
# Owlstack — Unified operations platform (NightOwl + TicketOwl)
# -----------------------------------------------------------------------------
owlstack:
  seed:
    enabled: true

  replicaCount:
    api: 1
    worker: 1

  image:
    tag: main
    pullPolicy: Always

  # Mount combined CA bundle so OIDC discovery trusts HTTPS Keycloak
  extraVolumes:
    - name: ca-bundle
      configMap:
        name: combined-ca-bundle
  extraVolumeMounts:
    - name: ca-bundle
      mountPath: /etc/ssl/certs/ca-certificates.crt
      subPath: ca-certificates.crt
      readOnly: true

  frontend:
    enabled: true
    image:
      tag: main
      pullPolicy: Always
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  api:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  worker:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 125m
        memory: 128Mi

  config:
    logLevel: debug
    corsAllowedOrigins: "https://nightowl.devops.lab"
    zammadUrl: "http://owl-zammad:8080"
    workerPollSeconds: "60"
    outlineUrl: "https://outline.devops.lab"

  secrets:
    databaseUrl: ""       # Set via values.lab-secrets.yaml
    redisUrl: ""            # Set via values.lab-secrets.yaml
    oidcClientId: "nightowl"
    oidcClientSecret: ""  # Set via values.lab-secrets.yaml
    oidcRedirectUrl: "https://nightowl.devops.lab/auth/oidc/callback"
    sessionSecret: ""     # Set via values.lab-secrets.yaml
    encryptionKey: ""     # Set via values.lab-secrets.yaml
    zammadToken: ""       # Set via values.lab-secrets.yaml
    outlineApiToken: ""   # Set via values.lab-secrets.yaml

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/issuer: step-cluster-issuer
      cert-manager.io/issuer-kind: StepClusterIssuer
      cert-manager.io/issuer-group: certmanager.step.sm
    hosts:
      - host: nightowl.devops.lab
        paths:
          - path: /api
            pathType: Prefix
            service: api
          - path: /auth
            pathType: Prefix
            service: api
          - path: /status
            pathType: Prefix
            service: api
          - path: /healthz
            pathType: Prefix
            service: api
          - path: /metrics
            pathType: Prefix
            service: api
          - path: /
            pathType: Prefix
            service: frontend
    tls:
      - secretName: nightowl-tls
        hosts:
          - nightowl.devops.lab

  serviceMonitor:
    enabled: false

  podDisruptionBudget:
    enabled: false

# -----------------------------------------------------------------------------
# PostgreSQL — in-cluster for lab
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    tag: latest
  auth:
    postgresPassword: ""  # Set via values.lab-secrets.yaml
    database: nightowl
  primary:
    persistence:
      size: 10Gi
      # Uses default StorageClass (Longhorn)
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    # NOTE: initdb.scripts is in values.lab-secrets.yaml because it contains
    # database user passwords that must match the service database URLs.

# -----------------------------------------------------------------------------
# Redis — in-cluster, standalone
# -----------------------------------------------------------------------------
redis:
  enabled: true
  image:
    tag: latest
  architecture: standalone
  auth:
    enabled: true
    password: ""  # Set via values.lab-secrets.yaml
  master:
    persistence:
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 125m
        memory: 128Mi

# -----------------------------------------------------------------------------
# Keycloak — enabled for OIDC
# -----------------------------------------------------------------------------
keycloak:
  enabled: true
  image:
    repository: bitnamilegacy/keycloak
    tag: 26.3.3-debian-12-r0
  auth:
    adminUser: admin
    adminPassword: ""  # Set via values.lab-secrets.yaml
  production: false
  proxyHeaders: xforwarded
  extraEnvVars:
    - name: KC_HOSTNAME
      value: "https://keycloak.devops.lab"
  postgresql:
    enabled: false
  externalDatabase:
    host: owl-postgresql
    port: 5432
    database: keycloak
    user: keycloak
    password: ""  # Set via values.lab-secrets.yaml
  ingress:
    enabled: true
    hostname: keycloak.devops.lab
    ingressClassName: nginx
    tls: true
    annotations:
      cert-manager.io/issuer: step-cluster-issuer
      cert-manager.io/issuer-kind: StepClusterIssuer
      cert-manager.io/issuer-group: certmanager.step.sm
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  realmImport:
    enabled: true

# -----------------------------------------------------------------------------
# Zammad — enabled for ticket management
# -----------------------------------------------------------------------------
zammad:
  enabled: true
  owlstackToken: ""  # Set via values.lab-secrets.yaml
  # Auto-create admin user on fresh install (no-op if users already exist)
  autoWizard:
    enabled: true
    config: |
      {
        "Users": [{
          "login": "admin@wisbric.local",
          "firstname": "Admin",
          "lastname": "Wisbric",
          "email": "admin@wisbric.local",
          "password": "OwlAdmin2026!"
        }],
        "Settings": [
          { "name": "product_name", "value": "Zammad (Lab)" },
          { "name": "timezone_default", "value": "Pacific/Auckland" }
        ],
        "Organizations": [
          { "name": "Acme Corp" },
          { "name": "Wisbric" }
        ]
      }
  # Disable Zammad's internal PostgreSQL and Redis — use shared instances
  zammadConfig:
    postgresql:
      enabled: false
      host: owl-postgresql
      port: 5432
      user: zammad
      pass: ""    # Set via values.lab-secrets.yaml
      db: zammad
    redis:
      enabled: false
      host: owl-redis-master
      port: 6379
      pass: ""  # Set via values.lab-secrets.yaml
  elasticsearch:
    image:
      repository: bitnamilegacy/elasticsearch
      tag: 8.12.0-debian-11-r1
    sysctlImage:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: 11-debian-11-r94
  memcached:
    image:
      repository: bitnamilegacy/memcached
      tag: 1.6.23-debian-11-r0
  ingress:
    enabled: true
    hosts:
      - host: zammad.devops.lab
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: zammad-tls
        hosts:
          - zammad.devops.lab
    annotations:
      cert-manager.io/issuer: step-cluster-issuer
      cert-manager.io/issuer-kind: StepClusterIssuer
      cert-manager.io/issuer-group: certmanager.step.sm

# -----------------------------------------------------------------------------
# Keep — AIOps alert management with oauth2-proxy SSO
# -----------------------------------------------------------------------------
keep:
  enabled: true
  oidcClientSecret: ""  # Set via values.lab-secrets.yaml
  secretName: keep-secrets
  secrets:
    databaseConnectionString: ""  # Set via values.lab-secrets.yaml
    nextauthSecret: ""            # Set via values.lab-secrets.yaml
  oauth2Proxy:
    enabled: true
    clientId: keep
    issuerUrl: "https://keycloak.devops.lab/realms/owls"
    hostname: keep.devops.lab
    cookieSecret: ""  # Set via values.lab-secrets.yaml
    skipTlsVerify: true  # Lab uses self-signed certs
  database:
    enabled: false
  backend:
    env:
      - name: AUTH_TYPE
        value: OAUTH2PROXY
      - name: SECRET_MANAGER_TYPE
        value: k8s
      - name: PORT
        value: "8080"
      - name: PUSHER_APP_ID
        value: "1"
      - name: PUSHER_APP_KEY
        value: keepappkey
      - name: PUSHER_APP_SECRET
        value: keepappsecret
      - name: PUSHER_HOST
        value: keep-websocket
      - name: PUSHER_PORT
        value: "6001"
      - name: PROMETHEUS_MULTIPROC_DIR
        value: "/tmp/prometheus"
    envFromSecret: keep-secrets
  frontend:
    env:
      - name: VERCEL
        value: "1"
      - name: ENV
        value: production
      - name: NODE_ENV
        value: production
      - name: HOSTNAME
        value: 0.0.0.0
      - name: PUSHER_APP_KEY
        value: "keepappkey"
      - name: FRIGADE_DISABLED
        value: "true"
    envFromSecret: keep-secrets
  websocket:
    enabled: true
  # Disable Keep's built-in ingress — traffic goes through oauth2-proxy
  global:
    ingress:
      enabled: false
  # Umbrella-managed ingress annotations for oauth2-proxy route
  ingressAnnotations:
    cert-manager.io/issuer: step-cluster-issuer
    cert-manager.io/issuer-kind: StepClusterIssuer
    cert-manager.io/issuer-group: certmanager.step.sm
  ingressTls:
    - secretName: keep-tls
      hosts:
        - keep.devops.lab

# -----------------------------------------------------------------------------
# Outline — collaborative wiki (replaces BookOwl)
# -----------------------------------------------------------------------------
outline:
  enabled: true
  oidcClientSecret: ""  # Set via values.lab-secrets.yaml
  secretName: outline-secrets
  secrets:
    secretKey: ""           # Set via values.lab-secrets.yaml
    utilsSecret: ""         # Set via values.lab-secrets.yaml
    databaseUrl: ""         # Set via values.lab-secrets.yaml
    redisUrl: ""            # Set via values.lab-secrets.yaml
    oidcClientSecret: ""    # Set via values.lab-secrets.yaml
    awsAccessKeyId: ""      # Set via values.lab-secrets.yaml after Garage key creation
    awsSecretAccessKey: ""  # Set via values.lab-secrets.yaml after Garage key creation
  # Disable bundled subcharts — use shared infrastructure
  postgresql:
    enabled: false
  minio:
    enabled: false
  dex:
    enabled: false
  redis:
    enabled: false
  cnpg:
    enabled: false
  # Outline app settings
  outline:
    generateEncryptionKeys: false
    url: "https://outline.devops.lab"
    fileStorage:
      system: s3
  # Non-secret env vars for OIDC and S3
  environment:
    # OIDC (Keycloak)
    - name: OIDC_CLIENT_ID
      value: outline
    - name: OIDC_AUTH_URI
      value: "https://keycloak.devops.lab/realms/owls/protocol/openid-connect/auth"
    - name: OIDC_TOKEN_URI
      value: "https://keycloak.devops.lab/realms/owls/protocol/openid-connect/token"
    - name: OIDC_USERINFO_URI
      value: "https://keycloak.devops.lab/realms/owls/protocol/openid-connect/userinfo"
    - name: OIDC_LOGOUT_URI
      value: "https://keycloak.devops.lab/realms/owls/protocol/openid-connect/logout"
    - name: OIDC_USERNAME_CLAIM
      value: preferred_username
    - name: OIDC_DISPLAY_NAME
      value: Keycloak
    - name: OIDC_SCOPES
      value: "openid profile email"
    # S3 (Garage)
    - name: AWS_S3_UPLOAD_BUCKET_URL
      value: "http://owl-garage:3900"
    - name: AWS_S3_UPLOAD_BUCKET_NAME
      value: outline
    - name: AWS_S3_FORCE_PATH_STYLE
      value: "true"
    - name: AWS_S3_ACL
      value: private
    - name: AWS_REGION
      value: garage
    # Trust self-signed CA for Keycloak OIDC discovery
    - name: NODE_EXTRA_CA_CERTS
      value: /etc/ssl/certs/ca-certificates.crt
  # Inject secrets from umbrella-managed K8s Secret
  environmentFrom:
    - secretRef:
        name: outline-secrets
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/issuer: step-cluster-issuer
      cert-manager.io/issuer-kind: StepClusterIssuer
      cert-manager.io/issuer-group: certmanager.step.sm
    hosts:
      - host: outline.devops.lab
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: outline-tls
        hosts:
          - outline.devops.lab
  # Mount CA bundle for Keycloak OIDC discovery (self-signed certs)
  extraVolumes:
    - name: ca-bundle
      configMap:
        name: combined-ca-bundle
  extraVolumeMounts:
    - name: ca-bundle
      mountPath: /etc/ssl/certs/ca-certificates.crt
      subPath: ca-certificates.crt
      readOnly: true

# -----------------------------------------------------------------------------
# Garage — S3-compatible storage for Outline uploads
# -----------------------------------------------------------------------------
garage:
  enabled: true
  garage:
    replicationFactor: "1"
    admin:
      token:
        create: true  # Enable Admin API for bucket/key management
    s3:
      api:
        region: garage
        rootDomain: ".s3.garage.devops.lab"
  deployment:
    replicaCount: 1
  persistence:
    meta:
      storageClass: longhorn
      size: 1Gi
    data:
      storageClass: longhorn
      size: 10Gi

# -----------------------------------------------------------------------------
# Backup — Daily PostgreSQL backups
# -----------------------------------------------------------------------------
backup:
  enabled: true
  schedule: "0 2 * * *"
  storageClass: longhorn
  storageSize: 5Gi
  retentionDays: 7
  databases:
    - nightowl
    - keycloak
    - keep
    - outline

# -----------------------------------------------------------------------------
# Network Policies — disabled in lab for easier debugging; enable in prod
# -----------------------------------------------------------------------------
networkPolicies:
  enabled: false
